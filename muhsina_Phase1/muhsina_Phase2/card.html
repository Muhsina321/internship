<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Card Design</title>
  <style>
    body {
      background-color: #f4f4f4;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 300px;
      margin: 50px auto; 
      padding: 20px; 
      border: 2px solid #ddd; 
      border-radius: 10px;
      background-color: #fff;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .card h2 {
      margin-bottom: 10px; 
    }

    .card p {
      margin-bottom: 15px; 
      color: #555;
    }

    .card button {
      padding: 10px 15px; 
      border: none;
      background-color: #007BFF;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .card button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Internship</h2>
    <p>An internship is a short-term work experience where you learn practical skills in a real company or organization</p>
    <button>Read More</button>
  </div>

</body>
</html>
