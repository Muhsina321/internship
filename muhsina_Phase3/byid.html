<!DOCTYPE html>
<html>
<head>
    <title>Change Text</title>
</head>
<body>

<h1 id="myText">Hello World</h1>

<button onclick="changeText()">Click here</button>

<script>
function changeText() {
    document.getElementById("myText").textContent = "welcome to hello world";
}
console.log("Text changed successfully");
</script>

</body>
</html>
