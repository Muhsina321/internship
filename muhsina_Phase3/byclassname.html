<html>
    <head>
        <title>change style</title>
    </head>
    <body>
        
        <h1 id="sample">welcome to my home page</h1>

        <button onclick="changeStyles()">Click here</button>

        <script>
        function changeStyles() {
        document.getElementById("sample").style.frontsize= "20px";
        document.getElementById("sample").style.fontStyle = "italic";
        document.getElementById("sample").style.color = "goldenrod";
        }
        console.log("Text changed style successfully");
        </script>
    </body>    
</html>
